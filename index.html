<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GEO/SCAN — Ghana Mining Prediction</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap');
:root{
  --gold:#F5C842;--gold-dim:#7A5A06;--bg0:#0B0D0F;--bg1:#111418;--bg2:#171C22;
  --teal:#28C8A8;--text:#C8D4E0;--text2:#7A9AB8;
}
body{font-family:'Barlow',sans-serif;background:var(--bg0);color:var(--text);margin:0;padding:0;height:100vh;overflow:hidden;font-size:13px}
.shell{display:grid;grid-template-rows:48px 1fr;height:100vh}
.topbar{background:var(--bg1);border-bottom:1px solid #2A3340;display:flex;align-items:center;padding:0 16px;gap:12px}
.logo{font-family:'Share Tech Mono',monospace;font-size:15px;color:var(--gold);letter-spacing:2px}
.status-pill{padding:3px 10px;border-radius:20px;font-size:11px;background:#0D3020;color:var(--teal);border:1px solid #1A4A30}
.main{display:grid;grid-template-columns:260px 1fr 260px;height:calc(100vh - 48px)}
.left,.right{background:var(--bg1);padding:12px;overflow-y:auto;border-right:1px solid #2A3340}
.right{border-right:none;border-left:1px solid #2A3340}
.section-label{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--text2);text-transform:uppercase;margin-bottom:6px}
.map-area{position:relative;background:#0B0D0F;height:100%}
canvas#terrain{width:100%;height:100%;display:block}
.scan-btn{width:100%;padding:12px;background:#0A2A10;color:#3DCC7A;border:none;border-radius:6px;font-weight:600;cursor:pointer;margin-top:10px}
.site-item{padding:8px;background:var(--bg2);margin-bottom:4px;border-radius:4px;cursor:pointer}
.notification{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A1000;border:1px solid var(--gold);color:var(--gold);padding:12px 20px;border-radius:6px;display:none;z-index:1000;max-width:90%;text-align:center}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="logo">GEO<span>/</span>SCAN</div>
    <div class="status-pill">● NATIONAL PREDICTION MODE</div>
    <div style="margin-left:auto;color:var(--text2);font-size:12px">Ghana Resource Network</div>
  </div>
  <div class="main">
    <!-- Left -->
    <div class="left">
      <div class="section-label">MISSION STATUS</div>
      <div>National Coverage: <span id="cov" style="color:var(--gold)">98%</span></div>
      <div>Area Scanned: <span id="area" style="color:var(--teal)">22.1 km² + 12 sites</span></div>
      <div>Detections: <span id="dets" style="color:#3DCC7A">3124</span></div>

      <div class="section-label" style="margin-top:20px">KNOWN SITES</div>
      <div id="sites"></div>

      <button onclick="startScan()" class="scan-btn">🚀 START GEO-SCAN PREDICTION</button>
    </div>

    <!-- Center Canvas Map -->
    <div class="map-area">
      <canvas id="terrain"></canvas>
    </div>

    <!-- Right -->
    <div class="right">
      <div class="section-label">LIVE DETECTIONS</div>
      <div style="background:#1A1000;border:1px solid var(--gold-dim);padding:8px;border-radius:6px;margin-bottom:8px;color:var(--gold)" id="alert1">High-confidence gold at Obuasi — 97%</div>
      <div style="background:#0A1820;padding:8px;border-radius:6px;color:var(--teal)" id="alert2">Lithium potential at Ewoyaa — 91%</div>

      <div class="section-label">MINERAL PREDICTION</div>
      <div id="minerals" style="font-size:12px"></div>
    </div>
  </div>
</div>

<div id="notification" class="notification"></div>

<script>
// Simple notification
function notify(msg) {
  const n = document.getElementById('notification');
  n.textContent = msg;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 4500);
}

// Populate known sites
const knownSites = ["Obuasi (Gold 97%)","Tarkwa (Gold 94%)","Ahafo (Gold 92%)","Ewoyaa (Lithium 82%)","Awaso (Bauxite 76%)"];
const siteDiv = document.getElementById('sites');
knownSites.forEach(s => {
  const d = document.createElement('div');
  d.className = 'site-item';
  d.textContent = s;
  siteDiv.appendChild(d);
});

document.getElementById('minerals').innerHTML = `
Gold ore <span style="color:#F5C842">97%</span><br>
Lithium <span style="color:#88E0FF">91%</span><br>
Bauxite <span style="color:#D8B070">78%</span><br>
Manganese <span style="color:#A8B8C8">73%</span>
`;

// Canvas drawing + prediction
const canvas = document.getElementById('terrain');
let ctx, W, H;

function resize() {
  W = canvas.offsetWidth;
  H = canvas.offsetHeight;
  canvas.width = W;
  canvas.height = H;
  drawBase();
}
window.addEventListener('resize', resize);

function drawBase() {
  ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0B0D0F';
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = '#1E2530';
  ctx.lineWidth = 1;
  for(let x=0; x<W; x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0; y<H; y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
